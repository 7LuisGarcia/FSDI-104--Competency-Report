<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Salon – Services</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f5f5;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        h1 {
            font-weight: 700;
            color: #343a40;
        }

        .card {
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .card-header {
            background-color: #343a40;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 12px 12px 0 0;
        }

        .btn-primary {
            background-color: #343a40;
            border: none;
        }

        .btn-primary:hover {
            background-color: #1f1f1f;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="index.html">Pet Salon</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNavDropdown">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">About Us</a></li>
                <li class="nav-item"><a class="nav-link active fw-bold" href="services.html">Services</a></li>
                <li class="nav-item"><a class="nav-link" href="registration.html">Registration</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- PAGE TITLE -->
<div class="container mt-4">
    <h1 class="text-center mb-4">Services</h1>
</div>

<!-- FORM CARD -->
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-6">

            <div class="card">
                <div class="card-header">Add a New Service</div>

                <div class="card-body">
                    <form id="services1">

                        <div class="mb-3">
                            <label class="form-label">Service Name</label>
                            <input id="serviceName" class="form-control" type="text" placeholder="Day Care" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <input id="serviceDescription" class="form-control" type="text" placeholder="Includes..." required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Price</label>
                            <input id="servicePrice" class="form-control" type="number" placeholder="49.99" step="any" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mb-2">Save</button>
                        <button type="reset" class="btn btn-secondary w-100">Cancel</button>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.js"></script>

<script>
    // Handle form submit
    $("#services1").on("submit", function (e) {
        e.preventDefault();
        alert("Service saved successfully!");
    });

    // Handle cancel button
    $("#services1").on("reset", function () {
        alert("Form cleared.");
    });
</script>

</body>
</html>
